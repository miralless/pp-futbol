name: Node CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 1. LIMITA EL TIEMPO: Si no termina en 15 min, aborta. No más esperas de 6 horas.
    timeout-minutes: 15

    env:
      # 2. OPT-IN A NODE 24: Elimina el aviso de depreciación y usa la versión moderna.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Evita que herramientas pregunten cosas al usuario (modo no interactivo)
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Usamos la versión 22 o 24 que son las recomendadas ahora
          node-version: '22' 
          # 3. CACHE: Esto hará que las dependencias se instalen volando tras la primera vez
          cache: 'npm'

      - name: Install dependencies
        # 4. LIMPIEZA: 'npm ci' es más rápido y seguro en entornos de servidor que 'npm install'
        run: npm ci

      - name: Build or Test
        run: npm run build --if-present