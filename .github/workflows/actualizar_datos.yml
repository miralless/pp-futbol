name: Node CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 1. LIMITA EL TIEMPO: Si no termina en 15 min, aborta. No más esperas de 6 horas.
    timeout-minutes: 15

    env:
      # 2. OPT-IN A NODE 24: Elimina el aviso de depreciación y usa la versión moderna.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Evita que herramientas pregunten cosas al usuario (modo no interactivo)
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          # 1. Indicamos a la caché dónde está el archivo de bloqueo
          cache-dependency-path: 'functions/package-lock.json'

      - name: Install dependencies
        # 2. Forzamos a que npm ci se ejecute dentro de esa carpeta
        run: npm ci
        working-directory: ./functions

      - name: Build (opcional)
        # Si tienes un script de build, también debe ejecutarse ahí
        run: npm run build --if-present
        working-directory: ./functions